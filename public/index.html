<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Melodia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1DB954;--bg:#060608;--s:#111118;--t:#f1eff9;--t2:#9090a8}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;overflow:hidden}
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.18;animation:drift 14s ease-in-out infinite}
.o1{width:600px;height:600px;background:#1DB954;top:-200px;left:-180px;animation-delay:0s}
.o2{width:450px;height:450px;background:#7c3aed;top:40%;right:-150px;animation-delay:-5s}
.o3{width:350px;height:350px;background:#f43f5e;bottom:-120px;left:35%;animation-delay:-9s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(25px,-25px) scale(1.06)}70%{transform:translate(-18px,18px) scale(.95)}}
.page{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:0}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(29,185,84,.12);border:1px solid rgba(29,185,84,.3);border-radius:100px;padding:.4rem 1rem;font-size:.78rem;font-weight:600;color:var(--g);letter-spacing:.5px;margin-bottom:1.75rem}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:blink 1.8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:clamp(3.2rem,9vw,6.5rem);font-weight:900;line-height:.95;letter-spacing:-3px;margin-bottom:1.25rem;background:linear-gradient(160deg,#fff 0%,#9090a8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:1.05rem;color:var(--t2);font-weight:300;max-width:420px;line-height:1.75;margin-bottom:2.5rem}
.login-btn{display:inline-flex;align-items:center;gap:13px;background:var(--g);color:#000;font-family:'Inter',sans-serif;font-size:.98rem;font-weight:700;padding:1rem 2.25rem;border-radius:100px;text-decoration:none;border:none;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(29,185,84,.38)}
.login-btn:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 14px 44px rgba(29,185,84,.55);background:#22d662}
.login-btn svg{width:22px;height:22px;fill:#000;flex-shrink:0}
.error{margin-top:1.5rem;padding:.7rem 1.4rem;background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.3);border-radius:8px;color:#fca5a5;font-size:.88rem;display:none}
.pills{position:absolute;bottom:2.5rem;display:flex;gap:.85rem;flex-wrap:wrap;justify-content:center}
.pill{font-size:.75rem;color:var(--t2);padding:.35rem .9rem;border:1px solid rgba(255,255,255,.08);border-radius:100px;background:rgba(255,255,255,.02)}
.pill b{color:var(--g)}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<main class="page">
  <div class="badge"><span class="badge-dot"></span>Powered by Spotify API</div>
  <h1>Melodia</h1>
  <p class="sub">La tua musica, analizzata. Statistiche, top tracks, playlist e riproduzione tutto in un posto.</p>
  <a href="/login" class="login-btn">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.622.622 0 0 1 .207.857zm1.223-2.722a.779.779 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.779.779 0 0 1-.973-.517.779.779 0 0 1 .517-.972c3.632-1.102 8.147-.569 11.236 1.326a.779.779 0 0 1 .257 1.072zm.105-2.835C14.69 8.956 9.365 8.773 6.18 9.747a.935.935 0 1 1-.543-1.79c3.632-1.102 9.67-.89 13.48 1.401a.935.935 0 0 1-.203 1.71z"/></svg>
    Accedi con Spotify
  </a>
  <div class="error" id="err"></div>
  <div class="pills">
    <div class="pill"><b>♫</b> Top Tracks</div>
    <div class="pill"><b>◈</b> Artisti</div>
    <div class="pill"><b>⟳</b> Recenti</div>
    <div class="pill"><b>▶</b> Player live</div>
    <div class="pill"><b>⌕</b> Ricerca</div>
    <div class="pill"><b>📊</b> Statistiche</div>
  </div>
</main>
<script>
const p = new URLSearchParams(location.search);
const e = p.get('error');
if (e) {
  const el = document.getElementById('err');
  const m = {access_denied:'Accesso negato.',state_mismatch:'Errore sicurezza, riprova.',token_failed:'Login fallito, riprova.',session_error:'Errore sessione, riprova.'};
  el.textContent = m[e] || `Errore: ${e}`;
  el.style.display = 'block';
}
</script>
</body>
</html>

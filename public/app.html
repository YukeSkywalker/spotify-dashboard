<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Melodia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">MELODIA</div>
            <nav>
                <div class="nav-item active" onclick="switchTab('overview')"><i class="fas fa-home"></i> Panoramica</div>
                <div class="nav-item" onclick="switchTab('top-tracks')"><i class="fas fa-music"></i> Top Tracks</div>
                <div class="nav-item" onclick="switchTab('top-artists')"><i class="fas fa-microphone"></i> Top Artists</div>
                <div class="nav-item" onclick="switchTab('recent')"><i class="fas fa-history"></i> Recenti</div>
                <div class="nav-item" onclick="switchTab('playlists')"><i class="fas fa-list"></i> Playlist</div>
                <div class="nav-item" onclick="switchTab('search')"><i class="fas fa-search"></i> Cerca</div>
                <div class="nav-item" onclick="switchTab('stats')"><i class="fas fa-chart-bar"></i> Statistiche</div>
            </nav>
            <div id="user-display" class="user-profile"></div>
            <a href="/logout" class="logout-btn">Logout</a>
        </aside>

        <main class="main-content">
            <!-- OVERVIEW -->
            <section id="overview" class="view">
                <h1>Panoramica</h1>
                <div class="hero-grid">
                    <div class="hero-card" id="best-track"></div>
                    <div class="hero-card" id="best-artist"></div>
                </div>
            </section>

            <!-- TRACKS/ARTISTS/RECENT/PLAYLISTS -->
            <section id="top-tracks" class="view hidden"><h1>Top Tracks</h1><div class="grid" id="grid-tracks"></div></section>
            <section id="top-artists" class="view hidden"><h1>Top Artists</h1><div class="grid" id="grid-artists"></div></section>
            <section id="recent" class="view hidden"><h1>Ascoltati di recente</h1><div class="grid" id="grid-recent"></div></section>
            <section id="playlists" class="view hidden"><h1>Le tue Playlist</h1><div class="grid" id="grid-playlists"></div></section>

            <!-- SEARCH -->
            <section id="search" class="view hidden">
                <h1>Cerca</h1>
                <input type="text" id="search-input" placeholder="Brani o artisti..." oninput="handleSearch(this.value)">
                <div class="grid" id="grid-search"></div>
            </section>

            <!-- STATS -->
            <section id="stats" class="view hidden">
                <h1>Le tue Statistiche</h1>
                <div id="stats-content" class="stats-grid"></div>
            </section>
        </main>

        <footer class="player-bar">
            <div id="now-playing" class="track-info">Nessun brano in riproduzione</div>
            <div class="player-controls">
                <button onclick="playerAction('pause')"><i class="fas fa-pause-circle"></i></button>
                <button onclick="playerAction('play')"><i class="fas fa-play-circle"></i></button>
                <button onclick="playerAction('next')"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="player-status"><i class="fas fa-desktop"></i> Spotify Connect</div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>

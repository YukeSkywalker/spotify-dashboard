<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melodia — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.622.622 0 0 1 .207.857zm1.223-2.722a.779.779 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.779.779 0 0 1-.973-.517.779.779 0 0 1 .517-.972c3.632-1.102 8.147-.569 11.236 1.326a.779.779 0 0 1 .257 1.072zm.105-2.835C14.69 8.956 9.365 8.773 6.18 9.747a.935.935 0 1 1-.543-1.79c3.632-1.102 9.67-.89 13.48 1.401a.935.935 0 0 1-.203 1.71z"/></svg>
        <span class="logo-name">Melodia</span>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Cambia tema">☀</button>
    </div>
    <div class="user-card" id="userCard">
      <div class="user-avatar-wrap">
        <img class="user-avatar" id="userAvatar" src="" alt="" style="display:none" />
        <div class="avatar-placeholder" id="avatarPlaceholder">?</div>
      </div>
      <div class="user-info">
        <div class="user-name" id="userName">Caricamento...</div>
        <div class="user-plan" id="userPlan"></div>
      </div>
    </div>
    <ul class="nav-list">
      <li><button class="nav-btn active" data-section="overview"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>Panoramica</button></li>
      <li><button class="nav-btn" data-section="top-tracks"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>Top Tracks</button></li>
      <li><button class="nav-btn" data-section="top-artists"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Top Artists</button></li>
      <li><button class="nav-btn" data-section="recent"><svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>Recenti</button></li>
      <li><button class="nav-btn" data-section="playlists"><svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>Playlist</button></li>
      <li><button class="nav-btn" data-section="search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Cerca</button></li>
    </ul>
    <button class="logout-btn" id="logoutBtn"><svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>Logout</button>
  </nav>

  <header class="mobile-header">
    <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
    <span class="mobile-logo">Melodia</span>
    <button class="theme-toggle-mobile" id="themeToggleMobile">☀</button>
  </header>

  <main class="main" id="main">
    <section class="section active" id="section-overview">
      <div class="section-header">
        <div><h2>Panoramica</h2><p class="section-sub">Ciao, <span id="overviewName">—</span></p></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">♫</div><div class="stat-value" id="statTracks">—</div><div class="stat-label">Top Tracks</div></div>
        <div class="stat-card"><div class="stat-icon">◈</div><div class="stat-value" id="statPlaylists">—</div><div class="stat-label">Playlist</div></div>
        <div class="stat-card"><div class="stat-icon">⟳</div><div class="stat-value" id="statRecent">—</div><div class="stat-label">Brani recenti</div></div>
        <div class="stat-card"><div class="stat-icon">⏱</div><div class="stat-value" id="statMinutes">—</div><div class="stat-label">Min. ascoltati</div></div>
      </div>
      <div class="overview-cols">
        <div class="overview-col"><h3 class="col-title">Top 5 Tracks</h3><div class="mini-list" id="overviewTopTracks"></div></div>
        <div class="overview-col"><h3 class="col-title">Ascoltati di recente</h3><div class="mini-list" id="overviewRecent"></div></div>
      </div>
    </section>

    <section class="section" id="section-top-tracks">
      <div class="section-header">
        <h2>Top Tracks</h2>
        <div class="time-range-tabs" id="topTracksTabs">
          <button class="tab-btn active" data-range="short_term">4 settimane</button>
          <button class="tab-btn" data-range="medium_term">6 mesi</button>
          <button class="tab-btn" data-range="long_term">Sempre</button>
        </div>
      </div>
      <div class="track-list" id="topTracksList"></div>
    </section>

    <section class="section" id="section-top-artists">
      <div class="section-header">
        <h2>Top Artists</h2>
        <div class="time-range-tabs" id="topArtistsTabs">
          <button class="tab-btn active" data-range="short_term">4 settimane</button>
          <button class="tab-btn" data-range="medium_term">6 mesi</button>
          <button class="tab-btn" data-range="long_term">Sempre</button>
        </div>
      </div>
      <div class="artists-grid" id="topArtistsList"></div>
    </section>

    <section class="section" id="section-recent">
      <div class="section-header"><h2>Recenti</h2><p class="section-sub">Gli ultimi 50 brani ascoltati</p></div>
      <div class="track-list" id="recentList"></div>
    </section>

    <section class="section" id="section-playlists">
      <div class="section-header"><h2>Playlist</h2></div>
      <div class="playlists-grid" id="playlistsGrid"></div>
      <div class="playlist-tracks-panel" id="playlistTracksPanel" style="display:none">
        <button class="back-btn" id="backFromPlaylist">← Torna alle playlist</button>
        <h3 id="playlistTracksTitle" style="margin-bottom:1.5rem;font-family:'Playfair Display',serif"></h3>
        <div class="track-list" id="playlistTracksList"></div>
      </div>
    </section>

    <section class="section" id="section-search">
      <div class="section-header"><h2>Cerca</h2></div>
      <div class="search-bar-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Cerca un brano, artista..." autocomplete="off" />
        <button class="search-clear" id="searchClear">✕</button>
      </div>
      <div class="track-list" id="searchResults"></div>
      <div class="search-empty" id="searchEmpty"><p>Inizia a digitare per cercare brani</p></div>
    </section>
  </main>

  <div class="player-bar" id="playerBar">
    <div class="player-track">
      <img class="player-art" id="playerArt" src="" alt="" style="display:none" />
      <div class="player-info">
        <div class="player-title" id="playerTitle">Nessun brano</div>
        <div class="player-artist" id="playerArtist">—</div>
      </div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="ctrl-btn play-pause" id="playPauseBtn">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    <div class="player-volume">
      <svg class="volume-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" />
    </div>
    <div class="player-open-spotify">
      <a href="https://open.spotify.com" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 0 1-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 1 1-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.622.622 0 0 1 .207.857zm1.223-2.722a.779.779 0 0 1-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.779.779 0 0 1-.973-.517.779.779 0 0 1 .517-.972c3.632-1.102 8.147-.569 11.236 1.326a.779.779 0 0 1 .257 1.072zm.105-2.835C14.69 8.956 9.365 8.773 6.18 9.747a.935.935 0 1 1-.543-1.79c3.632-1.102 9.67-.89 13.48 1.401a.935.935 0 0 1-.203 1.71z"/></svg>
      </a>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <script src="/app.js"></script>
</body>
</html>
